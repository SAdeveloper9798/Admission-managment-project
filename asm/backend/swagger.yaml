openapi: 3.0.0
info:
  title: Admission CRM API
  description: Minimal API documentation for Admission CRM
  version: 1.0.0
servers:
  - url: http://localhost:5000
paths:
  /api/health:
    get:
      summary: Health status
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
  /api/auth/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        '200':
          description: Login successful
        '401':
          description: Unauthorized
